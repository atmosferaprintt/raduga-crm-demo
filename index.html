<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Типография «Радуга» — CRM</title>
  <link rel="icon" href="./logo.webp" type="image/webp">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>

  <!-- Экран входа -->
  <div id="login-screen" class="hidden">
    <div class="login-card">
      <img src="./logo.webp" alt="raduga" class="login-logo">
      <div class="login-sub">Типография «Радуга» — CRM книжного производства</div>
      <form id="login-form" autocomplete="on">
        <label class="fld">
          <span>Логин</span>
          <input name="login" type="text" required autocomplete="username" autofocus>
        </label>
        <label class="fld">
          <span>Пароль</span>
          <input name="password" type="password" required autocomplete="current-password">
        </label>
        <div id="login-error" class="form-error hidden"></div>
        <button type="submit" class="btn btn-primary btn-block">Войти</button>
      </form>
      <div class="rainbow-line login-line"></div>
    </div>
  </div>

  <!-- Приложение -->
  <div id="app" class="hidden">
    <aside id="sidebar">
      <a class="side-logo" href="#/orders"><img src="./logo.webp" alt="raduga"></a>
      <nav id="nav">
        <a href="#/orders" data-route="orders">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="18" rx="1.5"/><rect x="14" y="3" width="7" height="12" rx="1.5"/></svg>
          <span>Заказы</span>
        </a>
        <a href="#/calc" data-route="calc">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="11" x2="8" y2="11.01"/><line x1="12" y1="11" x2="12" y2="11.01"/><line x1="16" y1="11" x2="16" y2="11.01"/><line x1="8" y1="15" x2="8" y2="15.01"/><line x1="12" y1="15" x2="12" y2="15.01"/><line x1="16" y1="15" x2="16" y2="18"/><line x1="8" y1="18" x2="12" y2="18"/></svg>
          <span>Калькулятор</span>
        </a>
        <a href="#/production" data-route="production">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 20h20"/><path d="M4 20V9l6 4V9l6 4V4h4v16"/></svg>
          <span>Производство</span>
        </a>
        <a href="#/stock" data-route="stock">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
          <span>Склад</span>
        </a>
        <a href="#/purchases" data-route="purchases">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          <span>Закупки</span>
        </a>
        <a href="#/clients" data-route="clients">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <span>Клиенты</span>
        </a>
        <a href="#/tasks" data-route="tasks">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          <span>Задачи</span>
        </a>
        <a href="#/analytics" data-route="analytics">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/><line x1="2" y1="20" x2="22" y2="20"/></svg>
          <span>Аналитика</span>
        </a>
        <a href="#/settings" data-route="settings" id="nav-settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          <span>Настройки</span>
        </a>
      </nav>
      <div class="side-footer">Печатаем книги<br>и не только уже 25 лет</div>
    </aside>

    <div id="content">
      <header id="topbar">
        <div id="page-title"></div>
        <div class="topbar-right">
          <div class="user-chip">
            <div class="user-avatar" id="user-avatar"></div>
            <div class="user-meta">
              <div class="user-name" id="user-name"></div>
              <div class="user-role" id="user-role"></div>
            </div>
          </div>
          <button class="btn btn-ghost btn-icon" id="btn-password" title="Сменить пароль">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </button>
          <button class="btn btn-ghost btn-icon" id="btn-logout" title="Выйти">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          </button>
        </div>
      </header>
      <div class="rainbow-line"></div>
      <main id="main"></main>
    </div>
  </div>

  <div id="modal-root"></div>
  <div id="toast-root"></div>
  <div id="print-area"></div>

  <script src="./pricing-bundle.js"></script>
  <script src="./pricing-real.enc.js"></script>
  <script src="./demo-mock.js"></script>
  <script src="./app.js"></script>
  <script src="./hints.js"></script>
  <script src="./views.js"></script>
  <script src="./calc.js"></script>
</body>
</html>
